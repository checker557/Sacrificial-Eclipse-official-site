<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲームタイトル</title>

<style>
body {
  margin: 0;
  font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
  color: white;
  background: url("star-bg.jpg") no-repeat center center fixed;
  background-size: cover;
}

section {
  padding: 120px 20px;
}

.dark-section {
  background: rgba(0,0,0,0.92);
}

h1, h2 {
  text-align: center;
  letter-spacing: 3px;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: clamp(36px, 6vw, 72px);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  width: 90%;
}

/* キャラグリッド */
.character-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  margin-top: 60px;
}

.character-card {
  background: rgba(20,20,20,0.9);
  padding: 30px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
  cursor: pointer;
}

.character-card:hover {
  transform: translateY(-8px);
  background: rgba(40,40,40,0.9);
}

.character-card a {
  color: white;
  text-decoration: none;
  font-size: 18px;
}

/* ギャラリー */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}

.gallery div {
  background: #222;
  height: 200px;
}

/* スマホ対応 */
@media (max-width: 768px) {
  .character-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1>ゲームタイトル</h1>
  <p>―― 星降る夜に、物語は始まる ――</p>
</section>

<section class="dark-section">
  <div class="container">
    <h2>STORY</h2>
    <p>ここにストーリー本文。</p>
  </div>
</section>

<section class="dark-section">
  <div class="container">
    <h2>SYSTEM</h2>
    <p>システム説明。</p>
  </div>
</section>

<section class="dark-section">
  <div class="container">
    <h2>CONCEPT</h2>
    <p>コンセプト説明。</p>
  </div>
</section>

<section class="dark-section">
  <div class="container">
    <h2>CHARACTER</h2>
    <div class="character-grid">
      <div class="character-card"><a href="character1.html">キャラ1</a></div>
      <div class="character-card"><a href="character2.html">キャラ2</a></div>
      <div class="character-card"><a href="character3.html">キャラ3</a></div>
      <div class="character-card"><a href="character4.html">キャラ4</a></div>
      <div class="character-card"><a href="character5.html">キャラ5</a></div>
      <div class="character-card"><a href="character6.html">キャラ6</a></div>
      <div class="character-card"><a href="character7.html">キャラ7</a></div>
      <div class="character-card"><a href="character8.html">キャラ8</a></div>
      <div class="character-card"><a href="character9.html">キャラ9</a></div>
      <div class="character-card"><a href="character10.html">キャラ10</a></div>
      <div class="character-card"><a href="character11.html">キャラ11</a></div>
      <div class="character-card"><a href="character12.html">キャラ12</a></div>
    </div>
  </div>
</section>

<section class="dark-section">
  <div class="container">
    <h2>CG GALLERY</h2>
    <div class="gallery">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</section>

</body>
</html>
